name: Download and commit music file

on:
  workflow_dispatch:

jobs:
  add-music:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download MP3
        run: |
          curl -L "https://archive.org/download/cigarettes-after-sex-songs-compilation_202203/Apocalypse%20-%20Cigarettes%20After%20Sex.mp3" -o apocalypse.mp3
          # Verify it's an MP3 (not an error page)
          file apocalypse.mp3

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apocalypse.mp3
          git commit -m "Replace with real Apocalypse MP3 from Archive.org" || echo "No changes to commit"
          git push
