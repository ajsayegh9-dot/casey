name: Fix music player text

on:
  workflow_dispatch:

jobs:
  fix-text:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find and remove placeholder text
        run: |
          grep -n "Add your MP3" index.html | head -5
          python3 -c "
import re
with open('index.html', 'r', encoding='utf-8') as f:
    content = f.read()
original = content
content = content.replace('Add your MP3 file to turn this into a real soundtrack.', '')
if content != original:
    with open('index.html', 'w', encoding='utf-8') as f:
        f.write(content)
    print('Placeholder text removed!')
else:
    print('Text not found with exact match, trying grep...')
    import subprocess
    result = subprocess.run(['grep', '-o', '.{50}Add your MP3.{50}', 'index.html'], capture_output=True, text=True)
    print(result.stdout[:500])
"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --stat
          git commit -m "Remove music placeholder text" || echo "No changes to commit"
          git push
