name: Fix music player text

on:
  workflow_dispatch:

jobs:
  fix-text:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Remove placeholder text from index.html
        run: |
          sed -i 's/Add your MP3 file to turn this into a real soundtrack\.//g' index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Remove music placeholder text" || echo "No changes to commit"
          git push
